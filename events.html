<!DOCTYPE html>
<html>
<head>
<title>Events</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
<h2 class="text-center mb-4">Available Events</h2>

<div class="row g-4 justify-content-center">

<!-- Movie Ticket -->
<div class="col-md-4">
<div class="card shadow text-center p-4">
<h5 class="fw-bold">Movie Ticket</h5>
<p>Book latest movie tickets instantly.</p>
<p class="fw-bold text-primary">Rs. 250</p>
<button class="btn btn-primary w-100">Book Now</button>
</div>
</div>

<!-- Concert Ticket -->
<div class="col-md-4">
<div class="card shadow text-center p-4">
<h5 class="fw-bold">Concert Ticket</h5>
<p>Book tickets for live concerts & events.</p>
<p class="fw-bold text-primary">Rs. 1000</p>
<button class="btn btn-primary w-100">Book Now</button>
</div>
</div>

</div>
</div>

</body>
</html>
